name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Run tests (if present)
        run: npm test --if-present
        continue-on-error: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine publish version
        id: ver
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "current=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Current version $VERSION already published. Will bump patch."
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "Current version $VERSION not yet published. Will publish as-is."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.ver.outputs.needs_bump == 'true'
        run: npm version patch -m "chore: release v%s [skip ci]"

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Push version commit and tag
        if: steps.ver.outputs.needs_bump == 'true'
        run: git push --follow-tags
